<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#05070c">
  <title>FlashZape</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="app">
    <header class="top">
      <div class="brand">⚡ Flash<b>Zape</b></div>
      <div id="status" class="status">FLASHLIGHT READY</div>
    </header>

    <main class="stage">
      <div class="torch">
        <div id="beam" class="beam"></div>
        <div class="head"></div>
        <div class="neck"></div>
        <div class="body">
          <div class="power">⏻</div>
        </div>
      </div>
    </main>

    <div class="controls">
      <button class="btn" id="on">
        ⏻ TURN ON
        <small>Start flashlight</small>
      </button>

      <button class="btn off" id="off">
        🔒 TURN OFF
        <small>Unlock for ₹10</small>
      </button>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="card">
      <div class="lock">🔒</div>
      <h1>Turn Off Flashlight</h1>
      <p>Pay ₹10 to unlock and turn off the flashlight.</p>
      <div class="price">₹10</div>
      <button class="pay" id="pay">PAY ₹10 WITH RAZORPAY</button>
    </div>
  </div>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="script.js"></script>
</body>
</html>
